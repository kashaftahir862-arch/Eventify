<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Register | Eventify</title>

  <link rel="stylesheet" href="register.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- Navbar -->
<nav class="navbar">

  <div class="logo">Eventify</div>

  <ul>
    <li><a href="index.html">Home</a></li>

    <li><a href="events.html">Events</a></li>

    <li><a class="active" href="#">Register</a></li>

    <li><a href="contact.html">Contact</a></li>
  </ul>

</nav>

<!-- Header -->
<header class="page-header">

  <h1>Select Your Role</h1>

  <p>
    Continue as User or Admin to access Eventify features
  </p>

</header>

<!-- Cards -->
<section class="event-options">

  <!-- User Card -->
  <div class="event-card reveal" onclick="openUserPage()">

    <h2>User</h2>

    <p>
      Register as a user and explore events easily with Eventify.
    </p>

    <button class="btn">
      User Register
    </button>

  </div>

  <!-- Admin Card -->
  <div class="event-card reveal" onclick="openAdminPage()">

    <h2>Admin</h2>

    <p>
      Login as admin to manage users, events and bookings.
    </p>

    <button class="btn">
      Admin Login
    </button>

  </div>

</section>

<!-- Footer -->
<footer>
  <p>Eventify | Designed with 💙</p>
</footer>

<script src="register.js"></script>

</body>
</html>
